<!-- @dsCard group="Components" name="Tabs" viewport="700x130" subtitle="Underline switch — Feed / My Photos" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  *{box-sizing:border-box} html,body{margin:0}
  body{font-family:var(--font-sans);background:var(--surface-card);padding:30px 28px;-webkit-font-smoothing:antialiased}
  .tabs{display:flex;gap:28px;border-bottom:1px solid var(--border);max-width:340px}
  .tab{appearance:none;background:none;border:none;cursor:pointer;font-family:var(--font-sans);font-size:16px;padding:0 0 12px;margin-bottom:-1px;border-bottom:2px solid transparent}
  .tab.on{font-weight:600;color:var(--text-strong);border-bottom-color:var(--accent)}
  .tab.off{font-weight:500;color:var(--text-faint)}
</style></head>
<body>
  <div class="tabs">
    <button class="tab on">Feed</button>
    <button class="tab off">My Photos</button>
  </div>
</body></html>
