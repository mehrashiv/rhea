<!-- @dsCard group="Components" name="Upload zone" viewport="700x230" subtitle="Drag-and-drop photo well — idle & hover" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  *{box-sizing:border-box} html,body{margin:0}
  body{font-family:var(--font-sans);background:var(--surface-card);padding:26px;-webkit-font-smoothing:antialiased;display:flex;gap:20px}
  .zone{flex:1;border-radius:var(--r-lg);padding:34px 24px;text-align:center;border:1.5px dashed var(--border-accent);background:var(--surface-sunken)}
  .zone.over{border-color:var(--accent);background:var(--accent-wash)}
  .t{font-family:var(--font-display);font-weight:500;font-size:24px;color:var(--text-strong)}
  .h{font-size:14px;color:var(--text-faint);margin-top:6px}
  .ico{margin-bottom:12px}
  .tag{font-size:11px;font-weight:600;letter-spacing:.14em;text-transform:uppercase;color:var(--text-faint);margin-top:10px}
</style></head>
<body>
  <div>
    <div class="zone">
      <div class="ico"><svg width="34" height="34" viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"><path d="M12 16V4"/><path d="m7 9 5-5 5 5"/><path d="M5 20h14"/></svg></div>
      <div class="t">Drop a photo here</div>
      <div class="h">or click to browse</div>
    </div>
    <div class="tag" style="text-align:center">Idle</div>
  </div>
  <div>
    <div class="zone over">
      <div class="ico"><svg width="34" height="34" viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"><path d="M12 16V4"/><path d="m7 9 5-5 5 5"/><path d="M5 20h14"/></svg></div>
      <div class="t">Drop to share</div>
      <div class="h">release anywhere in the well</div>
    </div>
    <div class="tag" style="text-align:center">Drag over</div>
  </div>
</body></html>
