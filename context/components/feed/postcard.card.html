<!-- @dsCard group="Components" name="Post card" viewport="700x560" subtitle="Author · photo · likes · caption" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  *{box-sizing:border-box} html,body{margin:0}
  body{font-family:var(--font-sans);background:var(--surface-page);padding:26px;-webkit-font-smoothing:antialiased;display:flex;justify-content:center}
  .card{width:360px;background:var(--surface-card);border:1px solid var(--border-subtle);border-radius:var(--r-lg);overflow:hidden;box-shadow:var(--shadow-sm)}
  header{display:flex;align-items:center;gap:10px;padding:13px 16px}
  .av{width:34px;height:34px;border-radius:var(--r-pill);background:var(--accent-wash);color:var(--accent);display:flex;align-items:center;justify-content:center;font-family:var(--font-display);font-weight:600;font-size:16px;border:1px solid var(--border-subtle)}
  .name{font-weight:600;font-size:14px;color:var(--text-strong)}
  .time{margin-left:auto;font-size:12px;color:var(--text-faint)}
  .photo{aspect-ratio:4/5;background:var(--photo-grad);display:flex;align-items:center;justify-content:center}
  .foot{padding:12px 16px 18px}
  .like{display:flex;align-items:center;gap:8px}
  .heart{width:40px;height:40px;border-radius:var(--r-pill);display:flex;align-items:center;justify-content:center;color:var(--like);margin-left:-8px}
  .cnt{font-weight:600;font-size:14px;color:var(--text-strong);margin-left:-6px}
  .cap{margin:8px 0 0;font-size:15px;line-height:1.5;color:var(--text-body)}
</style></head>
<body>
  <article class="card">
    <header>
      <div class="av">M</div>
      <span class="name">Mara</span>
      <span class="time">2h</span>
    </header>
    <div class="photo">
      <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="var(--lila-300)" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="m21 15-5-5L5 21"/></svg>
    </div>
    <div class="foot">
      <div class="like">
        <span class="heart"><svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor"><path d="M20.8 4.6a5.5 5.5 0 0 0-7.8 0L12 5.6l-1-1a5.5 5.5 0 0 0-7.8 7.8l1 1L12 21l7.8-7.6 1-1a5.5 5.5 0 0 0 0-7.8z"/></svg></span>
        <span class="cnt">24 likes</span>
      </div>
      <p class="cap">I made this by myself. Used a very new technique.</p>
    </div>
  </article>
</body></html>
