<!-- @dsCard group="Components" name="Buttons" viewport="700x190" subtitle="Pill buttons + icon buttons" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  *{box-sizing:border-box} html,body{margin:0}
  body{font-family:var(--font-sans);background:var(--surface-card);padding:26px 28px;-webkit-font-smoothing:antialiased}
  .row{display:flex;gap:14px;align-items:center;flex-wrap:wrap}
  .row+.row{margin-top:18px}
  .btn{font-family:var(--font-sans);font-weight:600;border-radius:var(--r-pill);border:1.5px solid transparent;cursor:pointer;font-size:15px;padding:12px 22px}
  .primary{background:var(--accent);color:#fff}
  .secondary{background:var(--accent-wash);color:var(--accent)}
  .ghost{background:var(--paper);color:var(--text-strong);border-color:var(--border)}
  .sm{font-size:13px;padding:8px 16px}
  .disabled{opacity:.45}
  .ib{width:40px;height:40px;border-radius:var(--r-pill);border:none;display:inline-flex;align-items:center;justify-content:center;background:transparent;color:var(--text-muted);cursor:pointer}
  .ib.on{color:var(--like)}
  .ib.wash{background:var(--surface-raised)}
  .lbl{font-size:11px;font-weight:600;letter-spacing:.14em;text-transform:uppercase;color:var(--text-faint);margin-left:8px}
</style></head>
<body>
  <div class="row">
    <button class="btn primary">Share a photo</button>
    <button class="btn secondary">Save draft</button>
    <button class="btn ghost">Sign out</button>
    <button class="btn primary disabled">Posting…</button>
  </div>
  <div class="row">
    <button class="btn primary sm">Post</button>
    <button class="btn ghost sm">Cancel</button>
    <span style="width:14px"></span>
    <button class="ib on" aria-label="Liked"><svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor" stroke="currentColor" stroke-width="1.4"><path d="M20.8 4.6a5.5 5.5 0 0 0-7.8 0L12 5.6l-1-1a5.5 5.5 0 0 0-7.8 7.8l1 1L12 21l7.8-7.6 1-1a5.5 5.5 0 0 0 0-7.8z"/></svg></button>
    <button class="ib" aria-label="Like"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M20.8 4.6a5.5 5.5 0 0 0-7.8 0L12 5.6l-1-1a5.5 5.5 0 0 0-7.8 7.8l1 1L12 21l7.8-7.6 1-1a5.5 5.5 0 0 0 0-7.8z"/></svg></button>
    <button class="ib wash" aria-label="More"><svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><circle cx="5" cy="12" r="1.6"/><circle cx="12" cy="12" r="1.6"/><circle cx="19" cy="12" r="1.6"/></svg></button>
    <span class="lbl">Icon buttons</span>
  </div>
</body></html>
