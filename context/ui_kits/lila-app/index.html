<!-- @dsCard group="Lila App" name="App — feed & share" viewport="900x600" -->
<!-- @startingPoint section="Lila App" subtitle="Full app — sign-in, feed, share a photo" viewport="900x720" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Lila</title>
<link rel="stylesheet" href="../../styles.css">
<style>
  *{box-sizing:border-box}
  html,body{margin:0}
  body{font-family:var(--font-sans);background:var(--surface-page);color:var(--text-body);-webkit-font-smoothing:antialiased}
  button{font-family:inherit}
  ::selection{background:var(--lila-200)}
</style>
</head>
<body>
<div id="root"></div>
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script type="text/lila-jsx" id="app-src">
const { useState, useRef } = React;

/* ---------- tiny inline icons ---------- */
const Heart = ({fill}) => (
  <svg width="22" height="22" viewBox="0 0 24 24" fill={fill?"currentColor":"none"} stroke="currentColor" strokeWidth="1.6" strokeLinecap="round" strokeLinejoin="round">
    <path d="M20.8 4.6a5.5 5.5 0 0 0-7.8 0L12 5.6l-1-1a5.5 5.5 0 0 0-7.8 7.8l1 1L12 21l7.8-7.6 1-1a5.5 5.5 0 0 0 0-7.8z"/>
  </svg>
);
const UploadIcon = () => (
  <svg width="34" height="34" viewBox="0 0 24 24" fill="none" stroke="var(--accent)" strokeWidth="1.4" strokeLinecap="round" strokeLinejoin="round">
    <path d="M12 16V4"/><path d="m7 9 5-5 5 5"/><path d="M5 20h14"/>
  </svg>
);
const PhotoGlyph = () => (
  <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="var(--lila-300)" strokeWidth="1.3" strokeLinecap="round" strokeLinejoin="round">
    <rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="m21 15-5-5L5 21"/>
  </svg>
);
const Mark = () => <img src="../../assets/lila-mark.svg" alt="" style={{width:30,height:30}}/>;

/* ---------- primitives ---------- */
function Button({children, variant="primary", size="md", style, ...p}){
  const [h,setH]=useState(false);
  const sizes={sm:{padding:"8px 16px",fontSize:13},md:{padding:"12px 22px",fontSize:15},lg:{padding:"15px 30px",fontSize:17}};
  const base={primary:{background:h?"var(--accent-hover)":"var(--accent)",color:"#fff",border:"1.5px solid transparent"},
    secondary:{background:h?"var(--lila-200)":"var(--accent-wash)",color:"var(--accent)",border:"1.5px solid transparent"},
    ghost:{background:h?"var(--surface-raised)":"var(--paper)",color:"var(--text-strong)",border:"1.5px solid var(--border)"}}[variant];
  return <button onMouseEnter={()=>setH(true)} onMouseLeave={()=>setH(false)}
    style={{fontWeight:600,borderRadius:"var(--r-pill)",cursor:"pointer",whiteSpace:"nowrap",
      transition:"background .2s, transform .12s", transform:h?"translateY(-1px)":"none", ...sizes[size], ...base, ...style}} {...p}>{children}</button>;
}
function Avatar({name="", size=34}){
  return <div style={{width:size,height:size,borderRadius:"999px",flex:"none",background:"var(--accent-wash)",color:"var(--accent)",
    display:"flex",alignItems:"center",justifyContent:"center",fontFamily:"var(--font-display)",fontWeight:600,fontSize:size*0.46,
    border:"1px solid var(--border-subtle)"}}>{(name.trim()[0]||"·").toUpperCase()}</div>;
}
function IconBtn({active,label,children,...p}){
  const [h,setH]=useState(false);
  return <button aria-label={label} onMouseEnter={()=>setH(true)} onMouseLeave={()=>setH(false)}
    style={{width:40,height:40,borderRadius:"999px",border:"none",display:"inline-flex",alignItems:"center",justifyContent:"center",
      background:h?"var(--surface-raised)":"transparent",color:active?"var(--like)":"var(--text-muted)",cursor:"pointer",transition:"all .2s"}} {...p}>{children}</button>;
}

/* ---------- post card ---------- */
function PostCard({post, onLike}){
  return (
    <article style={{background:"var(--surface-card)",border:"1px solid var(--border-subtle)",borderRadius:"var(--r-lg)",
      overflow:"hidden",boxShadow:"var(--shadow-sm)"}}>
      <header style={{display:"flex",alignItems:"center",gap:10,padding:"13px 16px"}}>
        <Avatar name={post.author}/>
        <span style={{fontWeight:600,fontSize:14,color:"var(--text-strong)"}}>{post.author}</span>
        <span style={{marginLeft:"auto",fontSize:12,color:"var(--text-faint)"}}>{post.timeAgo}</span>
      </header>
      <div style={{aspectRatio:"4 / 5",background:"var(--photo-grad)",display:"flex",alignItems:"center",justifyContent:"center"}}>
        {post.image ? <img src={post.image} alt={post.caption} style={{width:"100%",height:"100%",objectFit:"cover",display:"block"}}/> : <PhotoGlyph/>}
      </div>
      <div style={{padding:"12px 16px 18px"}}>
        <div style={{display:"flex",alignItems:"center",gap:4}}>
          <span style={{marginLeft:-8}}><IconBtn label="Like" active={post.liked} onClick={()=>onLike(post.id)}><Heart fill={post.liked}/></IconBtn></span>
          <span style={{fontWeight:600,fontSize:14,color:"var(--text-strong)"}}>{post.likes} {post.likes===1?"like":"likes"}</span>
        </div>
        {post.caption && <p style={{margin:"8px 0 0",fontSize:15,lineHeight:1.5,color:"var(--text-body)"}}>{post.caption}</p>}
      </div>
    </article>
  );
}

/* ---------- composer ---------- */
function Composer({me, onPost, onCancel}){
  const [img,setImg]=useState(null);
  const [cap,setCap]=useState("");
  const [over,setOver]=useState(false);
  const inp=useRef(null);
  function take(files){ const f=files&&files[0]; if(f){ const r=new FileReader(); r.onload=e=>setImg(e.target.result); r.readAsDataURL(f);} }
  return (
    <div style={{background:"var(--surface-card)",border:"1px solid var(--border-subtle)",borderRadius:"var(--r-lg)",boxShadow:"var(--shadow-sm)",padding:18,marginBottom:24}}>
      <div style={{fontFamily:"var(--font-display)",fontWeight:600,fontSize:26,color:"var(--text-strong)",marginBottom:14}}>Share a photo</div>
      {img ? (
        <div style={{position:"relative",borderRadius:"var(--r-md)",overflow:"hidden",aspectRatio:"4 / 5",background:"var(--photo-grad)"}}>
          <img src={img} alt="" style={{width:"100%",height:"100%",objectFit:"cover"}}/>
          <button onClick={()=>setImg(null)} style={{position:"absolute",top:10,right:10,border:"none",borderRadius:"999px",width:32,height:32,background:"rgba(33,30,46,.55)",color:"#fff",cursor:"pointer",fontSize:16}}>✕</button>
        </div>
      ) : (
        <div onClick={()=>inp.current.click()} onDragOver={e=>{e.preventDefault();setOver(true);}} onDragLeave={()=>setOver(false)}
          onDrop={e=>{e.preventDefault();setOver(false);take(e.dataTransfer.files);}}
          style={{border:`1.5px dashed ${over?"var(--accent)":"var(--border-accent)"}`,borderRadius:"var(--r-lg)",
            background:over?"var(--accent-wash)":"var(--surface-sunken)",padding:"40px 30px",textAlign:"center",cursor:"pointer",transition:"all .2s"}}>
          <div style={{marginBottom:12}}><UploadIcon/></div>
          <div style={{fontFamily:"var(--font-display)",fontWeight:500,fontSize:24,color:"var(--text-strong)"}}>Drop a photo here</div>
          <div style={{fontSize:14,color:"var(--text-faint)",marginTop:6}}>or click to browse</div>
          <input ref={inp} type="file" accept="image/*" hidden onChange={e=>take(e.target.files)}/>
        </div>
      )}
      <textarea value={cap} onChange={e=>setCap(e.target.value)} rows="2" placeholder="Say how you made it…"
        style={{width:"100%",marginTop:14,border:"1px solid var(--border)",borderRadius:"var(--r-md)",padding:"12px 14px",
          fontFamily:"var(--font-sans)",fontSize:15,color:"var(--text-body)",resize:"none",outline:"none",background:"var(--paper)"}}/>
      <div style={{display:"flex",gap:10,justifyContent:"flex-end",marginTop:14}}>
        <Button variant="ghost" size="sm" onClick={onCancel}>Cancel</Button>
        <Button size="sm" onClick={()=>onPost({image:img,caption:cap})} style={{opacity:img?1:.5,pointerEvents:img?"auto":"none"}}>Post</Button>
      </div>
    </div>
  );
}

/* ---------- seed ---------- */
const SEED=[
  {id:1,author:"Mara",timeAgo:"2h",image:null,caption:"I made this by myself. Used a very new technique.",likes:24,liked:false},
  {id:2,author:"Sena",timeAgo:"5h",image:null,caption:"first draft of the spring jacket — still deciding on the collar.",likes:41,liked:true},
  {id:3,author:"Wren",timeAgo:"1d",image:null,caption:"little sketch before bed ✦",likes:18,liked:false},
];

/* ---------- app ---------- */
function App(){
  const [me,setMe]=useState(null);
  const [name,setName]=useState("");
  const [tab,setTab]=useState("feed");
  const [composing,setComposing]=useState(false);
  const [posts,setPosts]=useState(SEED);

  function like(id){ setPosts(ps=>ps.map(p=>p.id===id?{...p,liked:!p.liked,likes:p.likes+(p.liked?-1:1)}:p)); }
  function post({image,caption}){
    setPosts(ps=>[{id:Date.now(),author:me,timeAgo:"now",image,caption,likes:0,liked:false,mine:true},...ps]);
    setComposing(false); setTab("mine");
  }

  /* ----- sign in ----- */
  if(!me){
    return (
      <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",padding:24,
        background:"radial-gradient(120% 80% at 50% 0%, var(--lila-100) 0%, var(--surface-page) 60%)"}}>
        <div style={{width:"100%",maxWidth:380,textAlign:"center"}}>
          <div style={{display:"flex",alignItems:"center",justifyContent:"center",gap:11,marginBottom:22}}>
            <img src="../../assets/lila-mark.svg" alt="" style={{width:40,height:40}}/>
            <span style={{fontFamily:"var(--font-display)",fontWeight:600,fontSize:44,color:"var(--text-strong)",lineHeight:1}}>lila</span>
          </div>
          <div style={{fontFamily:"var(--font-display)",fontSize:30,color:"var(--text-strong)",lineHeight:1.15}}>A quiet place for your looks</div>
          <p style={{fontSize:15,color:"var(--text-muted)",margin:"12px 0 26px",lineHeight:1.55}}>Share what you make — clothes, sketches, the things you dream up.</p>
          <input value={name} onChange={e=>setName(e.target.value)} placeholder="What should we call you?"
            onKeyDown={e=>{if(e.key==="Enter"&&name.trim())setMe(name.trim());}}
            style={{width:"100%",border:"1px solid var(--border)",borderRadius:"var(--r-pill)",padding:"13px 20px",fontFamily:"var(--font-sans)",
              fontSize:15,textAlign:"center",outline:"none",color:"var(--text-body)",background:"var(--paper)"}}/>
          <div style={{marginTop:14}}>
            <Button size="lg" style={{width:"100%",opacity:name.trim()?1:.5,pointerEvents:name.trim()?"auto":"none"}} onClick={()=>setMe(name.trim())}>Enter</Button>
          </div>
        </div>
      </div>
    );
  }

  const shown = tab==="feed" ? posts : posts.filter(p=>p.mine);

  return (
    <div style={{minHeight:"100vh"}}>
      {/* header */}
      <header style={{position:"sticky",top:0,zIndex:5,background:"rgba(251,250,254,.85)",backdropFilter:"blur(10px)",
        borderBottom:"1px solid var(--border-subtle)"}}>
        <div style={{maxWidth:600,margin:"0 auto",padding:"14px 20px",display:"flex",alignItems:"center",gap:12}}>
          <div style={{display:"flex",alignItems:"center",gap:9}}>
            <Mark/><span style={{fontFamily:"var(--font-display)",fontWeight:600,fontSize:28,color:"var(--text-strong)",lineHeight:1}}>lila</span>
          </div>
          <div style={{marginLeft:"auto",display:"flex",alignItems:"center",gap:10}}>
            <Button size="sm" onClick={()=>setComposing(true)}>Share a photo</Button>
            <Button variant="ghost" size="sm" onClick={()=>{setMe(null);setName("");setTab("feed");setComposing(false);}}>Sign out</Button>
          </div>
        </div>
        {/* tabs */}
        <div style={{maxWidth:600,margin:"0 auto",padding:"0 20px"}}>
          <div style={{display:"flex",gap:28,borderBottom:"1px solid var(--border)"}}>
            {[["feed","Feed"],["mine","My Photos"]].map(([v,l])=>(
              <button key={v} onClick={()=>setTab(v)} style={{appearance:"none",background:"none",border:"none",cursor:"pointer",fontSize:16,
                fontWeight:tab===v?600:500,color:tab===v?"var(--text-strong)":"var(--text-faint)",padding:"0 0 12px",marginBottom:-1,
                borderBottom:tab===v?"2px solid var(--accent)":"2px solid transparent",transition:"color .2s",whiteSpace:"nowrap"}}>{l}</button>
            ))}
          </div>
        </div>
      </header>

      {/* feed column */}
      <main style={{maxWidth:600,margin:"0 auto",padding:"24px 20px 80px"}}>
        {composing && <Composer me={me} onPost={post} onCancel={()=>setComposing(false)}/>}
        {shown.length===0 ? (
          <div style={{textAlign:"center",padding:"70px 20px"}}>
            <div style={{fontFamily:"var(--font-display)",fontSize:26,color:"var(--text-strong)"}}>Nothing here yet</div>
            <p style={{fontSize:15,color:"var(--text-muted)",marginTop:8}}>Share your first photo and it'll live here.</p>
            <div style={{marginTop:18}}><Button onClick={()=>setComposing(true)}>Share a photo</Button></div>
          </div>
        ) : (
          <div style={{display:"flex",flexDirection:"column",gap:24}}>
            {shown.map(p=> <PostCard key={p.id} post={p} onLike={like}/> )}
          </div>
        )}
      </main>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
<script>
  (function(){
    var src = document.getElementById('app-src').textContent;
    var out = Babel.transform(src, { presets: [['react', { runtime: 'classic' }]] }).code;
    (0, eval)(out);
  })();
</script>
</body>
</html>
