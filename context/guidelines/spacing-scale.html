<!-- @dsCard group="Spacing" name="Spacing scale" subtitle="4px base ramp" viewport="700x150" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  *{box-sizing:border-box} html,body{margin:0}
  body{font-family:var(--font-sans);background:var(--surface-card);padding:26px 28px;-webkit-font-smoothing:antialiased;display:flex;gap:14px;align-items:flex-end}
  .col{display:flex;flex-direction:column;align-items:center;gap:8px}
  .bar{width:34px;background:var(--accent-wash);border:1px solid var(--border-accent);border-radius:var(--r-sm)}
  .v{font-size:11px;color:var(--text-muted)}
  .k{font-size:11px;font-weight:600;color:var(--text-strong)}
</style></head>
<body>
  <div class="col"><div class="bar" style="height:4px"></div><div class="k">1</div><div class="v">4</div></div>
  <div class="col"><div class="bar" style="height:8px"></div><div class="k">2</div><div class="v">8</div></div>
  <div class="col"><div class="bar" style="height:12px"></div><div class="k">3</div><div class="v">12</div></div>
  <div class="col"><div class="bar" style="height:16px"></div><div class="k">4</div><div class="v">16</div></div>
  <div class="col"><div class="bar" style="height:20px"></div><div class="k">5</div><div class="v">20</div></div>
  <div class="col"><div class="bar" style="height:24px"></div><div class="k">6</div><div class="v">24</div></div>
  <div class="col"><div class="bar" style="height:32px"></div><div class="k">8</div><div class="v">32</div></div>
  <div class="col"><div class="bar" style="height:40px"></div><div class="k">10</div><div class="v">40</div></div>
  <div class="col"><div class="bar" style="height:48px"></div><div class="k">12</div><div class="v">48</div></div>
  <div class="col"><div class="bar" style="height:64px"></div><div class="k">16</div><div class="v">64</div></div>
</body></html>
