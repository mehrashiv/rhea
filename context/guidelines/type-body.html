<!-- @dsCard group="Type" name="Body · Hanken Grotesk" subtitle="Sans for UI, captions & meta" viewport="700x230" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  *{box-sizing:border-box} html,body{margin:0}
  body{font-family:var(--font-sans);background:var(--surface-card);padding:26px 30px;-webkit-font-smoothing:antialiased;color:var(--text-body)}
  .lbl{font-size:11px;font-weight:600;letter-spacing:.14em;text-transform:uppercase;color:var(--text-faint)}
  .stack > div{display:flex;align-items:baseline;gap:16px;padding:5px 0}
</style></head>
<body>
  <div class="stack">
    <div><span style="font:var(--text-lg);color:var(--text-strong)">Share what you make.</span><span class="lbl">Lead · 19/500</span></div>
    <div><span style="font:var(--text-md)">Post a photo, add a note about how you made it, and let people who get it find your work.</span></div>
    <div><span style="font:var(--text-sm);color:var(--text-muted)">I made this by myself. Used a very new technique.</span><span class="lbl">Caption · 15</span></div>
    <div><span style="font:var(--text-xs);color:var(--text-muted)">24 likes · 2h ago</span><span class="lbl">Meta · 13/500</span></div>
    <div><span class="lbl" style="color:var(--accent)">EYEBROW LABEL · 12 / .14em</span></div>
  </div>
</body></html>
