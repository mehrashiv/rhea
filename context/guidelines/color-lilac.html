<!-- @dsCard group="Colors" name="Lilac ramp" subtitle="Brand lilac — press → wash" viewport="700x150" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  *{box-sizing:border-box} html,body{margin:0}
  body{font-family:var(--font-sans);background:var(--surface-card);padding:24px 26px;-webkit-font-smoothing:antialiased}
  .row{display:flex;gap:12px}
  .sw{flex:1}
  .chip{height:62px;border-radius:var(--r-md);border:1px solid rgba(33,30,46,.05)}
  .nm{font-size:13px;font-weight:600;color:var(--text-strong);margin-top:9px}
  .hex{font-size:11px;color:var(--text-faint);text-transform:uppercase;letter-spacing:.02em}
</style></head>
<body>
  <div class="row">
    <div class="sw"><div class="chip" style="background:var(--lila-700)"></div><div class="nm">Press</div><div class="hex">#5A47B8</div></div>
    <div class="sw"><div class="chip" style="background:var(--lila-600)"></div><div class="nm">Hover</div><div class="hex">#6A57C4</div></div>
    <div class="sw"><div class="chip" style="background:var(--lila-500)"></div><div class="nm">Lilac · primary</div><div class="hex">#7E6CD4</div></div>
    <div class="sw"><div class="chip" style="background:var(--lila-300)"></div><div class="nm">Accent</div><div class="hex">#B4A8E6</div></div>
    <div class="sw"><div class="chip" style="background:var(--lila-200)"></div><div class="nm">Petal</div><div class="hex">#DCD6F7</div></div>
    <div class="sw"><div class="chip" style="background:var(--lila-100)"></div><div class="nm">Wash</div><div class="hex">#F4F1FD</div></div>
  </div>
</body></html>
