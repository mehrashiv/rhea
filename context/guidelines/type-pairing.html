<!-- @dsCard group="Type" name="Pairing in use" subtitle="Serif title over sans body" viewport="700x190" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  *{box-sizing:border-box} html,body{margin:0}
  body{font-family:var(--font-sans);background:var(--surface-raised);padding:30px 34px;-webkit-font-smoothing:antialiased}
  .eyebrow{font-size:12px;font-weight:600;letter-spacing:.14em;text-transform:uppercase;color:var(--accent);margin-bottom:10px}
  h1{font-family:var(--font-display);font-weight:600;font-size:44px;line-height:1.0;margin:0;color:var(--text-strong);letter-spacing:.01em}
  p{font:var(--text-md);color:var(--text-body);margin:14px 0 0;max-width:460px}
</style></head>
<body>
  <div class="eyebrow">New here</div>
  <h1>Made by hand, shared with care</h1>
  <p>Cormorant Garamond carries the feeling; Hanken Grotesk keeps the interface calm and legible. Serif for moments, sans for everything you tap.</p>
</body></html>
