<!-- @dsCard group="Colors" name="Semantic roles" subtitle="Where each token belongs" viewport="700x170" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  *{box-sizing:border-box} html,body{margin:0}
  body{font-family:var(--font-sans);background:var(--surface-page);padding:24px 26px;-webkit-font-smoothing:antialiased;display:flex;gap:16px}
  .card{flex:1;background:var(--surface-card);border:1px solid var(--border);border-radius:var(--r-lg);padding:18px;box-shadow:var(--shadow-sm)}
  .t{font-family:var(--font-display);font-size:22px;color:var(--text-strong);font-weight:600}
  .b{font-size:14px;color:var(--text-body);margin-top:6px;line-height:1.5}
  .m{font-size:12px;color:var(--text-muted);margin-top:10px}
  .btn{display:inline-block;margin-top:14px;background:var(--accent);color:#fff;font-size:13px;font-weight:600;padding:9px 18px;border-radius:var(--r-pill)}
  .well{flex:.7;background:var(--photo-grad);border-radius:var(--r-lg)}
  .tok{font-family:var(--font-sans);font-size:11px;color:var(--text-faint);margin-top:4px}
</style></head>
<body>
  <div class="card">
    <div class="t">Surface card</div>
    <div class="b">Body text sits at <b>--text-body</b> on <b>--surface-card</b>.</div>
    <div class="m">Meta / muted line</div>
    <span class="btn">Accent action</span>
  </div>
  <div class="well"></div>
  <div style="flex:.9;display:flex;flex-direction:column;justify-content:center;gap:6px">
    <div style="font-size:13px;font-weight:600;color:var(--text-strong)">Page</div><div class="tok">--surface-page · #FBFAFE</div>
    <div style="font-size:13px;font-weight:600;color:var(--text-strong);margin-top:8px">Raised wash</div><div class="tok">--surface-raised · #F4F1FD</div>
    <div style="font-size:13px;font-weight:600;color:var(--text-strong);margin-top:8px">Photo well</div><div class="tok">--photo-grad</div>
  </div>
</body></html>
