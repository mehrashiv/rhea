<!-- @dsCard group="Brand" name="Voice & tone" subtitle="How Lila writes — warm, plain, first-person maker" viewport="700x210" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  *{box-sizing:border-box} html,body{margin:0}
  body{font-family:var(--font-sans);background:var(--surface-card);color:var(--text-body);padding:26px 30px;-webkit-font-smoothing:antialiased}
  .grid{display:grid;grid-template-columns:1fr 1fr;gap:14px 36px}
  .row{display:flex;gap:12px;align-items:flex-start}
  .tick{flex:none;width:18px;height:18px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;margin-top:2px}
  .yes{background:var(--accent-wash);color:var(--accent)}
  .no{background:#F3EDED;color:#B98A8A}
  .q{font-style:italic;font-family:var(--font-display);font-size:19px;color:var(--text-strong);line-height:1.3}
  .lbl{font-size:11px;font-weight:600;letter-spacing:.14em;text-transform:uppercase;color:var(--text-faint);margin-bottom:6px}
</style></head>
<body>
  <div class="grid">
    <div>
      <div class="lbl">We say</div>
      <div class="row"><span class="tick yes">✓</span><span class="q">"I made this by hand."</span></div>
      <div class="row" style="margin-top:10px"><span class="tick yes">✓</span><span class="q">"Share what you make."</span></div>
      <div class="row" style="margin-top:10px"><span class="tick yes">✓</span><span class="q">"A quiet place for your looks."</span></div>
    </div>
    <div>
      <div class="lbl">Not</div>
      <div class="row"><span class="tick no">✕</span><span style="font-size:15px;color:var(--text-muted)">"Unleash your fashion potential!!"</span></div>
      <div class="row" style="margin-top:10px"><span class="tick no">✕</span><span style="font-size:15px;color:var(--text-muted)">"Post content to grow your reach."</span></div>
      <div class="row" style="margin-top:10px"><span class="tick no">✕</span><span style="font-size:15px;color:var(--text-muted)">ALL-CAPS HYPE · emoji spam 🔥✨</span></div>
    </div>
  </div>
</body></html>
