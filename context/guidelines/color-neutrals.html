<!-- @dsCard group="Colors" name="Ink & neutrals" subtitle="Text and border ramp on paper" viewport="700x150" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  *{box-sizing:border-box} html,body{margin:0}
  body{font-family:var(--font-sans);background:var(--surface-card);padding:24px 26px;-webkit-font-smoothing:antialiased}
  .row{display:flex;gap:12px}
  .sw{flex:1}
  .chip{height:62px;border-radius:var(--r-md);border:1px solid rgba(33,30,46,.06)}
  .nm{font-size:13px;font-weight:600;color:var(--text-strong);margin-top:9px}
  .hex{font-size:11px;color:var(--text-faint);text-transform:uppercase;letter-spacing:.02em}
</style></head>
<body>
  <div class="row">
    <div class="sw"><div class="chip" style="background:var(--ink-900)"></div><div class="nm">Ink · strong</div><div class="hex">#211E2E</div></div>
    <div class="sw"><div class="chip" style="background:var(--ink-700)"></div><div class="nm">Body</div><div class="hex">#403C4C</div></div>
    <div class="sw"><div class="chip" style="background:var(--ink-500)"></div><div class="nm">Muted</div><div class="hex">#6B6678</div></div>
    <div class="sw"><div class="chip" style="background:var(--ink-400)"></div><div class="nm">Faint</div><div class="hex">#9A96A6</div></div>
    <div class="sw"><div class="chip" style="background:var(--ink-200)"></div><div class="nm">Border</div><div class="hex">#ECE9F4</div></div>
    <div class="sw"><div class="chip" style="background:var(--paper);border:1px solid var(--border)"></div><div class="nm">Paper</div><div class="hex">#FFFFFF</div></div>
  </div>
</body></html>
