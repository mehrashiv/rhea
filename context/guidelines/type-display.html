<!-- @dsCard group="Type" name="Display · Cormorant Garamond" subtitle="Serif voice for titles & moments" viewport="700x230" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  *{box-sizing:border-box} html,body{margin:0}
  body{font-family:var(--font-sans);background:var(--surface-card);padding:26px 30px;-webkit-font-smoothing:antialiased}
  .d{font-family:var(--font-display);color:var(--text-strong);white-space:nowrap}
  .lbl{font-size:11px;font-weight:600;letter-spacing:.14em;text-transform:uppercase;color:var(--text-faint);white-space:nowrap}
  .stack > div{display:flex;align-items:baseline;gap:16px;padding:9px 0}
</style></head>
<body>
  <div class="stack">
    <div><span class="d" style="font:var(--display-xl)">Made by hand</span></div>
    <div><span class="d" style="font:var(--display-lg)">A quiet place for your looks</span><span class="lbl">Display LG · 42</span></div>
    <div><span class="d" style="font:var(--display-md)">Drop a photo here</span><span class="lbl">Display MD · 30</span></div>
    <div><span class="d" style="font-style:italic;font:italic var(--display-sm)">made with care</span><span class="lbl">Italic accent · 24</span></div>
  </div>
</body></html>
