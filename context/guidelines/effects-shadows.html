<!-- @dsCard group="Effects" name="Shadows" subtitle="Soft, low, lilac-tinted elevation" viewport="700x170" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  *{box-sizing:border-box} html,body{margin:0}
  body{font-family:var(--font-sans);background:var(--surface-page);padding:30px 28px;-webkit-font-smoothing:antialiased;display:flex;gap:26px;align-items:center}
  .col{display:flex;flex-direction:column;align-items:center;gap:12px}
  .box{width:96px;height:64px;background:var(--surface-card);border-radius:var(--r-lg)}
  .nm{font-size:12px;font-weight:600;color:var(--text-strong)}
</style></head>
<body>
  <div class="col"><div class="box" style="box-shadow:var(--shadow-xs)"></div><div class="nm">xs</div></div>
  <div class="col"><div class="box" style="box-shadow:var(--shadow-sm)"></div><div class="nm">sm</div></div>
  <div class="col"><div class="box" style="box-shadow:var(--shadow-md)"></div><div class="nm">md</div></div>
  <div class="col"><div class="box" style="box-shadow:var(--shadow-lg)"></div><div class="nm">lg</div></div>
  <div class="col"><div class="box" style="box-shadow:var(--shadow-focus)"></div><div class="nm">focus ring</div></div>
</body></html>
